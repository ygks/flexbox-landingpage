<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="container">
      <p id="past" class="past"></p>
      <p id="screen" class="screen"></p>
      <button class="button-C" onclick="clearObj()">C</button>
      <button class="button-divide" onclick="operateButton('/')">%</button>
      <button class="button-7" onclick="addNum(7)">7</button>
      <button class="button-8" onclick="addNum(8)">8</button>
      <button class="button-9" onclick="addNum(9)">9</button>
      <button class="button-multiply" onclick="operateButton('x')">x</button>
      <button class="button-4" onclick="addNum(4)">4</button>
      <button class="button-5" onclick="addNum(5)">5</button>
      <button class="button-6" onclick="addNum(6)">6</button>
      <button class="button-minus" onclick="operateButton('-')">-</button>
      <button class="button-1" onclick="addNum(1)">1</button>
      <button class="button-2" onclick="addNum(2)">2</button>
      <button class="button-3" onclick="addNum(3)">3</button>
      <button class="button-add" onclick="operateButton('+')">+</button>
      <button class="button-0" onclick="addNum(0)">0</button>
      <button class="button-equal" onclick="equal()">=</button>
    </div>
  </body>
  <script src="/script.js"></script>
</html>
